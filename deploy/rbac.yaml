---
apiVersion: v1
kind: Namespace
metadata:
  name: aluminatai

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aluminatai-agent
  namespace: aluminatai

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aluminatai-agent
rules:
  # Required to discover running pods for GPU→job attribution
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Required to read pod owner references for job metadata
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  # Run:ai jobs
  - apiGroups: ["run.ai"]
    resources: ["runaijobs", "trainingjobs", "interactivejobs"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aluminatai-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aluminatai-agent
subjects:
  - kind: ServiceAccount
    name: aluminatai-agent
    namespace: aluminatai
