# AluminatAI agent — Docker Compose deployment
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed (nvidia-ctk)
#   - Copy .env.example to .env and fill in ALUMINATAI_API_KEY
#
# Usage:
#   docker compose up -d
#   docker compose logs -f

services:
  agent:
    image: aluminatai/agent:latest
    restart: unless-stopped
    pid: host           # Required: lets the agent read /proc/<pid>/environ for attribution
    runtime: nvidia     # Provides libnvidia-ml.so at runtime

    environment:
      ALUMINATAI_API_KEY: ${ALUMINATAI_API_KEY}
      ALUMINATAI_API_ENDPOINT: ${ALUMINATAI_API_ENDPOINT:-https://aluminatiai.com/api/metrics/ingest}
      COLLECTION_INTERVAL_S: ${COLLECTION_INTERVAL_S:-5}
      METRICS_PORT: ${METRICS_PORT:-9100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    volumes:
      # Persist WAL across container restarts — ensures no metrics lost during outages
      - aluminatai-wal:/app/data/wal

    ports:
      # Prometheus scrape endpoint (disable by setting METRICS_PORT=0)
      - "${METRICS_PORT:-9100}:9100"

    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  aluminatai-wal:
    driver: local
