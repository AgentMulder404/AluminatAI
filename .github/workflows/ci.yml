name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Agent ─────────────────────────────────────────────────────────────────────
  agent:
    name: Agent (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install agent with optional extras
        run: pip install -e ".[prometheus,otel]"

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest agent/tests/ -v --tb=short --cov=agent --cov-report=xml --ignore=agent/tests/powercap_ab_test.py --ignore=agent/tests/test_collector.py

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          ERRORS=$(npx eslint . 2>&1 | grep -c "error" || true)
          echo "ESLint errors: $ERRORS (baseline: 33)"
          if [ "$ERRORS" -gt 33 ]; then
            echo "::error::New ESLint errors detected ($ERRORS > 33 baseline)"
            npx eslint . 2>&1
            exit 1
          fi

      - name: Typecheck
        run: |
          ERRORS=$(npx tsc --noEmit -p tsconfig.ci.json 2>&1 | grep "error TS" | wc -l)
          echo "TypeScript errors: $ERRORS (baseline: 12)"
          if [ "$ERRORS" -gt 12 ]; then
            echo "::error::New TypeScript errors detected ($ERRORS > 12 baseline)"
            npx tsc --noEmit -p tsconfig.ci.json 2>&1 | grep "error TS"
            exit 1
          fi

      - name: Run tests with coverage
        run: npm run test -- --coverage
