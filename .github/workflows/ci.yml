name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Agent ─────────────────────────────────────────────────────────────────────
  agent:
    name: Agent (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install agent with optional extras
        run: pip install -e ".[prometheus,otel]"

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest agent/tests/ -v --tb=short --cov=agent --cov-report=xml --ignore=agent/tests/powercap_ab_test.py --ignore=agent/tests/test_collector.py

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (install · test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
