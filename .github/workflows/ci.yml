name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aluminatai-landing

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private submodule
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: aluminatai-landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Real values should be set as GitHub repo secrets.
          # These stubs let the build complete in CI — they are not used at runtime.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'stub_anon_key' }}
          NEXT_PUBLIC_APP_URL: "https://aluminatiai.com"
          SUPABASE_SERVICE_ROLE_KEY: "stub_service_role_key"
          ADMIN_EMAIL: "ci@aluminatiai.com"
          ANTHROPIC_API_KEY: "stub_anthropic_key"
          STRIPE_SECRET_KEY: "sk_test_stub"
          STRIPE_WEBHOOK_SECRET: "whsec_stub"
          RESEND_API_KEY: "re_stub"
          CRON_SECRET: "stub_cron_secret"

  # ── Agent ─────────────────────────────────────────────────────────────────────
  agent:
    name: Agent (install · test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install agent with optional extras
        # nvidia-ml-py3 installs fine without a GPU — NVML is loaded lazily at runtime.
        # Tests mock pynvml so they run correctly without hardware.
        run: pip install -e ".[prometheus,otel]"

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest agent/tests/ -v --tb=short
